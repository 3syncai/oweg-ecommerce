<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Live Tracking</title>
  <style>
    .outline { fill: none; stroke: var(--oweg-dark, #1F2A33); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .muted-outline { fill: none; stroke: var(--oweg-muted, #667085); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .accent { fill: var(--oweg-green, #66C940); }
    .accent-stroke { fill: none; stroke: var(--oweg-green, #66C940); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .soft { fill: var(--oweg-soft, #EAF8E7); }
    .red-soft { fill: #FEECEC; }
    .red { fill: var(--oweg-red, #D92D20); }
    .red-stroke { fill: none; stroke: var(--oweg-red, #D92D20); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .orange-soft { fill: #FFF4E5; }
    .orange { fill: var(--oweg-orange, #F79009); }
    .orange-stroke { fill: none; stroke: var(--oweg-orange, #F79009); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    .blue-soft { fill: #EAF3FF; }
    .blue { fill: var(--oweg-blue, #1570EF); }
    .blue-stroke { fill: none; stroke: var(--oweg-blue, #1570EF); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <path class="outline" d="M32 56s17-15 17-31c0-9-7-16-17-16s-17 7-17 16c0 16 17 31 17 31z"/>
  <circle class="accent" cx="32" cy="25" r="4"/>
