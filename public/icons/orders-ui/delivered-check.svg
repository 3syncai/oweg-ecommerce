    .soft { fill: var(--oweg-soft, #EAF8E7); }
    .red-soft { fill: #FEECEC; }
    .red { fill: var(--oweg-red, #D92D20); }
    .red-stroke { fill: none; stroke: var(--oweg-red, #D92D20); stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
