<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-labelledby="title">
  <title id="title">Stay Signed In</title>
  <style>
    .outline { fill: none; stroke: #1F2A33; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
